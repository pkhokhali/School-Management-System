services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: student_mgmt
      MYSQL_USER: student_user
      MYSQL_PASSWORD: student_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file:
      - ../backend/.env
    environment:
      DB_ENGINE: mysql
      DB_NAME: student_mgmt
      DB_USER: student_user
      DB_PASSWORD: student_pass
      DB_HOST: db
      USE_REDIS: "true"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ../backend:/app
      - media_data:/app/media
      - ./entrypoint.backend.sh:/entrypoint.sh:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/features/', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  celery:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file:
      - ../backend/.env
    environment:
      DB_ENGINE: mysql
      DB_HOST: db
      DB_NAME: student_mgmt
      DB_USER: student_user
      DB_PASSWORD: student_pass
      USE_REDIS: "true"
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ../backend:/app
    depends_on:
      - backend
      - redis
    command: celery -A config worker -l info

  celery-beat:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    environment:
      DB_ENGINE: mysql
      DB_HOST: db
      DB_NAME: student_mgmt
      DB_USER: student_user
      DB_PASSWORD: student_pass
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ../backend:/app
    depends_on:
      - celery
    command: celery -A config beat -l info

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../admin-portal/dist:/usr/share/nginx/html/admin:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  media_data:
