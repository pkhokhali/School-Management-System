# Build Android APK in the cloud — no Android Studio on your PC required.
# Usage: GitHub → Actions → "Build mobile APK" → Run workflow
#        Enter your API URL (PC IP for physical phone testing).
name: Build mobile APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API URL (e.g. http://192.168.101.85:8000/api/v1)'
        required: true
        default: 'http://10.0.2.2:8000/api/v1'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze Dart (lib + test)
        working-directory: mobile
        run: flutter analyze --no-fatal-infos

      - name: Build debug APK
        working-directory: mobile
        run: flutter build apk --debug --dart-define=API_BASE_URL=${{ inputs.api_base_url }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: institute-mobile-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
